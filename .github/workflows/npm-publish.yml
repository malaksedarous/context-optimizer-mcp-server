name: Publish to npm

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  id-token: write  # Required for npm trusted publishing and provenance

jobs:
  build-and-publish:
    # Avoid publishing from forks
    if: github.repository_owner == 'malaksedarous'
    runs-on: ubuntu-latest
    environment: npm-publish  # Optional: matches environment name in npm settings

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Update npm (required for Trusted Publishing)
        run: npm install -g npm@latest

      - name: Show Node and npm versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --silent

      - name: Compute versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          pkg_name=$(node -p "require('./package.json').name")
          pkg_version=$(node -p "require('./package.json').version")
          published_version=$(npm view "$pkg_name" version 2>/dev/null || echo none)
          echo "package_name=$pkg_name" >> "$GITHUB_OUTPUT"
          echo "package_version=$pkg_version" >> "$GITHUB_OUTPUT"
          echo "published_version=$published_version" >> "$GITHUB_OUTPUT"
          echo "Package: $pkg_name"
          echo "Local version: $pkg_version"
          echo "Published version: $published_version"

      - name: Fail if version already published
        if: steps.versions.outputs.published_version == steps.versions.outputs.package_version
        run: |
          echo "❌ ERROR: Version ${{ steps.versions.outputs.package_version }} is already published on npm!"
          echo "Please update the version in package.json before publishing."
          exit 1

      - name: Publish to npm
        if: steps.versions.outputs.published_version != steps.versions.outputs.package_version
        run: |
          echo "Publishing version ${{ steps.versions.outputs.package_version }} to npm using Trusted Publishing..."
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Actor: ${{ github.actor }}"
          
          # Publish using Trusted Publishing with OIDC
          echo "🔄 Publishing with Trusted Publishing..."
          if npm_output=$(npm publish --access public 2>&1); then
            echo "✅ Published successfully with Trusted Publishing"
            echo "$npm_output"
          else
            exit_code=$?
            echo "❌ Trusted Publishing failed with exit code: $exit_code"
            echo "Error output:"
            echo "$npm_output"
            exit $exit_code
          fi
